name: Docker Image CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the repository code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Set up Java JDK 21
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin' # Popular, reliable OpenJDK distribution
        cache: 'maven'          # Caches dependencies to speed up future builds

    # 3. Clean and package the Java application into a JAR
    - name: Build artifact with Maven
      run: mvn clean package

    # 4. Log in to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }} # Use a Personal Access Token (PAT) here

    # 5. Build the Docker image and push it to Docker Hub
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        # Tags it as 'latest' and with a unique timestamp
        tags: |
          ${{ secrets.DOCKER_HUB_USERNAME }}/code_editor:latest
          ${{ secrets.DOCKER_HUB_USERNAME }}/code_editor:${{ github.run_id }}

    # 6. SSH into EC2 and deploy the new container
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Log in to Docker Hub inside EC2
          echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
          
          # Stop and remove the existing container if it exists
          docker stop code_editor-container || true
          docker rm code_editor-container || true
          
          # Pull the latest image
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/code_editor:latest
          
          # Run the new container (adjust ports as needed)
          docker run -d --name code_editor-container -p 9090:9090 ${{ secrets.DOCKER_HUB_USERNAME }}/code_editor:latest
